name: Test en deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ingebouwde testgevallen
        run: node test.js

  # Publiceert door naar de gh-pages-branch; GitHub Pages serveert die
  # (bron: "Deploy from a branch", automatisch geactiveerd bij de eerste push).
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push naar gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:gh-pages
